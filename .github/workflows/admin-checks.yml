name: Admin and Worker checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and UI tests
        run: npm test

      - name: Worker runtime tests
        run: npm run test:worker

      - name: Worker type check
        run: npm run typecheck:worker

      - name: Build admin assets
        run: npm run build:admin

      - name: Worker dry-run build
        run: npm run build:worker
